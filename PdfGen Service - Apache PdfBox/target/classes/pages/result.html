<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>PDF Preview</title>
  <style>
    body { font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; padding:12px; background:#f8fafc; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 16px; max-width:1100px; margin:0 auto; }
    .card { background:#fff; padding:16px; border-radius:14px; box-shadow:0 6px 24px rgba(0,0,0,0.08); }
    iframe { width:100%; height:80vh; border:0; border-radius:12px; }
    a.button { display:inline-block; background:#16a34a; color:#fff; padding:10px 14px; border-radius:10px; text-decoration:none; font-weight:600; }
    a.button:hover { background:#15803d; }
    .back { color:#2563eb; text-decoration:none; }
  </style>
</head>
<body>
  <div class="grid">
    <div class="card">
      <div style="display:flex; gap:12px; align-items:center; justify-content:space-between;">
        <a class="back" href="/">&#8592; Back</a>
        <a class="button" href="{{DOWNLOAD_URL}}">Download PDF</a>
      </div>
    </div>
    <div class="card">
      <iframe src="{{INLINE_URL}}"></iframe>
    </div>
  </div>
</body>
</html>
